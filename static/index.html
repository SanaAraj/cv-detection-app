<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Detection</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: #fff;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #666;
        }
        .upload-area p {
            color: #666;
            margin-bottom: 15px;
        }
        .upload-area input {
            display: none;
        }
        .preview {
            max-width: 100%;
            max-height: 300px;
            margin-top: 20px;
            border-radius: 4px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #555; }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .results {
            margin-top: 30px;
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            display: none;
        }
        .results.visible { display: block; }
        .results h2 {
            margin-bottom: 15px;
            color: #333;
        }
        .result-image {
            width: 100%;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .detections {
            list-style: none;
        }
        .detections li {
            padding: 10px;
            background: #f9f9f9;
            margin-bottom: 8px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
        }
        .confidence {
            color: #666;
        }
        .message {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #c00;
            background: #fee;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .error.visible { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Object Detection</h1>

        <div class="upload-area" id="uploadArea">
            <p>Drop an image here or click to upload</p>
            <input type="file" id="fileInput" accept="image/*">
            <img class="preview" id="preview" style="display: none;">
        </div>

        <button class="btn" id="detectBtn" disabled>Detect Objects</button>

        <div class="error" id="error"></div>

        <div class="results" id="results">
            <h2>Results</h2>
            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Processing...</p>
            </div>
            <img class="result-image" id="resultImage" style="display: none;">
            <ul class="detections" id="detections"></ul>
            <p class="message" id="noResults" style="display: none;">No objects detected</p>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const detectBtn = document.getElementById('detectBtn');
        const results = document.getElementById('results');
        const loading = document.getElementById('loading');
        const resultImage = document.getElementById('resultImage');
        const detections = document.getElementById('detections');
        const noResults = document.getElementById('noResults');
        const errorDiv = document.getElementById('error');

        let selectedFile = null;

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files[0]) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) {
                handleFile(fileInput.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('Please upload an image file');
                return;
            }
            selectedFile = file;
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            detectBtn.disabled = false;
            hideError();
            results.classList.remove('visible');
        }

        detectBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            hideError();
            results.classList.add('visible');
            loading.style.display = 'block';
            resultImage.style.display = 'none';
            detections.innerHTML = '';
            noResults.style.display = 'none';
            detectBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/detect', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                loading.style.display = 'none';
                detectBtn.disabled = false;

                if (data.error) {
                    showError(data.error);
                    results.classList.remove('visible');
                    return;
                }

                resultImage.src = data.image_url;
                resultImage.style.display = 'block';

                if (data.detections.length === 0) {
                    noResults.style.display = 'block';
                } else {
                    data.detections.forEach(det => {
                        const li = document.createElement('li');
                        li.innerHTML = `<span>${det.class}</span><span class="confidence">${(det.confidence * 100).toFixed(1)}%</span>`;
                        detections.appendChild(li);
                    });
                }
            } catch (err) {
                loading.style.display = 'none';
                detectBtn.disabled = false;
                showError('Something went wrong. Please try again.');
            }
        });

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.add('visible');
        }

        function hideError() {
            errorDiv.classList.remove('visible');
        }
    </script>
</body>
</html>
